<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATION</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* AKASH watermark */
body::before {
  content: "AKASH AKASH AKASH AKASH";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size: 80px;
  color: rgba(255,255,255,0.05);
  white-space: nowrap;
  pointer-events: none;
}

.box {
  position: relative;
  z-index: 1;
  background:#111827;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:380px;
  text-align:center;
}

input,button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#messages {
  height:250px;
  overflow-y:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

.message {
  padding:8px;
  margin:5px 0;
  border-radius:10px;
  max-width:75%;
}

.me { background:#22c55e; align-self:flex-end; }
.other { background:#374151; align-self:flex-start; }

.time { font-size:10px; opacity:0.7; }

#chatBox { display:none; }
</style>
</head>

<body>

<div class="box">
<h2>🌍 NATION</h2>

<input id="name" placeholder="Your Name">
<input id="room" placeholder="Secret Code">

<button onclick="startChat()">Start</button>

<div id="chatBox">
<div id="messages"></div>

<input id="msgInput" placeholder="Type message">
<button onclick="sendMsg()">Send</button>
<button onclick="clearChat()">🗑 Clear</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔴 APNA FIREBASE CONFIG YAHA DAALO
const firebaseConfig = {
  apiKey: "AIzaSyDUA-coxrYBEYlSfWq3eD4pFMSuA6Gqcqk",
  authDomain: "nation-3581d.firebaseapp.com",
  databaseURL: "https://nation-3581d-default-rtdb.firebaseio.com",
  projectId: "nation-3581d",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username="", room="";

window.startChat = function(){
  username = document.getElementById("name").value;
  room = document.getElementById("room").value;

  if(!username || !room){
    alert("Enter name and code");
    return;
  }

  document.getElementById("chatBox").style.display="block";

  const chatRef = ref(db,"rooms/"+room);

  onChildAdded(chatRef,(data)=>{
    let div=document.createElement("div");
    div.classList.add("message");

    let text=document.createElement("div");
    text.innerText=data.val();

    let time=document.createElement("div");
    time.className="time";
    time.innerText=new Date().toLocaleTimeString();

    div.appendChild(text);
    div.appendChild(time);

    if(data.val().startsWith(username)){
      div.classList.add("me");
    } else {
      div.classList.add("other");
    }

    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;
  });
};

window.sendMsg=function(){
  let msg=msgInput.value;
  if(!msg) return;

  push(ref(db,"rooms/"+room), username+": "+msg);
  msgInput.value="";
};

window.clearChat=function(){
  remove(ref(db,"rooms/"+room));
  messages.innerHTML="";
};

// enter send
msgInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMsg();
});
</script>

</body>
</html>
